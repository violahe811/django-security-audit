<!DOCTYPE html>
<html>

<head>

    <title>Product Review App</title>

    <style>

        body {
            font-family: Arial;
            padding: 40px;
            background-color: #f5f5f5;
        }

        h1 {
            color: #333;
        }

        form {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
        }

        input,
        textarea {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            margin-bottom: 20px;
        }

        button {
            padding: 10px 20px;
            background: black;
            color: white;
            border: none;
            cursor: pointer;
        }

        .review {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

    </style>

</head>

<body>

    <h1>Product Review App</h1>

    <!-- POST form -->
    <!-- CSRF token prevents cross-site request forgery -->

    <form method="POST">

        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit">
            Submit Review
        </button>

    </form>

    <h2>Reviews</h2>

    {% for review in reviews %}

        <div class="review">

            <!-- SAFE: Django auto-escapes user content -->

            <h3>{{ review.name }}</h3>

            <p>{{ review.content }}</p>

            <small>{{ review.created_at }}</small>

        </div>

    {% endfor %}

</body>

</html>
